# Dev (i4g-dev) overrides.
#
# Most cloud values live in settings.default.toml.  This file only
# captures values that are inherently environment-specific and NOT injected
# by Terraform env vars (see infra/environments/app/dev/terraform.tfvars).

[api]
cors_origins = ["https://console.i4g.dev", "https://app.dev.intelligenceforgood.org", "http://localhost:3000"]

[integration]
core_api_url = "https://api.dev.intelligenceforgood.org"

[ecx]
enabled = true
# api_key — injected via SSI_ECX__API_KEY from Secret Manager (i4g-dev).
# To temporarily test enrichment from your workstation:
#   conda run -n i4g-ssi SSI_ECX__API_KEY=<key> ssi investigate <url>
